# CBET 7B model configuration — for full experiments
# VLLM server must be running Qwen2.5-7B-Instruct-AWQ on http://localhost:8000/v1

model_name: Qwen2.5-7B-Instruct-AWQ
model_path: ./models/Qwen2.5-7B-Instruct-AWQ
nli_model_path: ./models/nli-deberta-v3-base
backend: vllm
vllm_base_url: http://localhost:8000/v1
vllm_model: qwen25-7b
dataset: hotpotqa
data_path: ./AdaRAGUE/data/adaptive_rag_hotpotqa/test.csv
theta: 0.50
tau: 0.5
max_iterations: 5
min_iterations: 2
max_branches: 6
max_new_tokens: 256
temperature: 0.1
nli_claim_extraction: true
seed: 42
